<div class="flex min-h-dvh flex-col bg-slate-50 text-slate-900">
  <header class="bg-pitch-900 text-white shadow-sm">
    <nav
      class="mx-auto flex max-w-5xl items-center gap-4 px-4 py-3 sm:gap-6"
      aria-label="Primary"
    >
      <a
        routerLink="/"
        class="flex shrink-0 items-center gap-2 whitespace-nowrap rounded-lg outline-none focus-visible:ring-2 focus-visible:ring-amber-400"
      >
        <svg
          viewBox="0 0 24 24"
          class="h-6 w-6 text-amber-400"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <circle cx="12" cy="12" r="9.5" />
          <path d="M12 7.2l4.4 3.2-1.7 5.2H9.3L7.6 10.4z" />
          <path
            d="M12 7.2V2.6M16.4 10.4l4.2-1.5M14.7 15.6l2.7 3.4M9.3 15.6l-2.7 3.4M7.6 10.4l-4.2-1.5"
          />
        </svg>
        <span class="font-display text-xl font-bold tracking-tight">
          {{ 'nav.brand' | transloco }}
        </span>
      </a>

      <ul class="hidden items-center gap-1 text-sm font-medium md:flex">
        @for (item of navItems; track item.path) {
          <li>
            <a
              [routerLink]="item.path"
              routerLinkActive="bg-emerald-500 text-white shadow-sm"
              [routerLinkActiveOptions]="item.exact ? exactMatch : looseMatch"
              ariaCurrentWhenActive="page"
              class="block rounded-full px-3 py-1.5 text-emerald-50/80 transition-colors hover:bg-white/10 hover:text-white"
            >
              {{ item.labelKey | transloco }}
            </a>
          </li>
        }
      </ul>

      <div class="ms-auto flex items-center gap-3 text-sm">
        <combi-language-switcher />
        @defer (on idle) {
          <combi-auth-status />
        } @placeholder {
          <span class="h-8 w-20" aria-hidden="true"></span>
        }
      </div>
    </nav>
  </header>

  <main
    class="mx-auto w-full max-w-5xl flex-1 px-4 pt-6 pb-[calc(5rem+env(safe-area-inset-bottom))] md:pb-8"
  >
    <router-outlet />
  </main>

  <combi-bottom-nav />
</div>

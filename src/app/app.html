<div class="flex min-h-dvh flex-col bg-slate-50 text-slate-900">
  <header class="bg-pitch-900 text-white shadow-sm">
    <nav
      class="mx-auto flex max-w-5xl flex-col gap-3 px-4 py-3 sm:flex-row sm:items-center sm:gap-6"
      aria-label="Primary"
    >
      <a
        routerLink="/"
        class="flex shrink-0 items-center gap-2 whitespace-nowrap rounded-lg outline-none focus-visible:ring-2 focus-visible:ring-amber-400"
      >
        <svg
          viewBox="0 0 24 24"
          class="h-6 w-6 text-amber-400"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <circle cx="12" cy="12" r="9.5" />
          <path d="M12 7.2l4.4 3.2-1.7 5.2H9.3L7.6 10.4z" />
          <path
            d="M12 7.2V2.6M16.4 10.4l4.2-1.5M14.7 15.6l2.7 3.4M9.3 15.6l-2.7 3.4M7.6 10.4l-4.2-1.5"
          />
        </svg>
        <span class="font-display text-xl font-bold tracking-tight">
          {{ 'nav.brand' | transloco }}
        </span>
      </a>

      <ul
        class="nav-scroll -mx-4 flex items-center gap-1 overflow-x-auto whitespace-nowrap px-4 text-sm font-medium sm:mx-0 sm:px-0"
      >
        <li>
          <a
            routerLink="/"
            routerLinkActive="bg-emerald-500 text-white shadow-sm"
            [routerLinkActiveOptions]="{ exact: true }"
            class="block rounded-full px-3 py-1.5 text-emerald-50/80 transition-colors hover:bg-white/10 hover:text-white"
          >
            {{ 'nav.predictNow' | transloco }}
          </a>
        </li>
        <li>
          <a
            routerLink="/matches"
            routerLinkActive="bg-emerald-500 text-white shadow-sm"
            class="block rounded-full px-3 py-1.5 text-emerald-50/80 transition-colors hover:bg-white/10 hover:text-white"
          >
            {{ 'nav.matches' | transloco }}
          </a>
        </li>
        <li>
          <a
            routerLink="/leaderboard"
            routerLinkActive="bg-emerald-500 text-white shadow-sm"
            class="block rounded-full px-3 py-1.5 text-emerald-50/80 transition-colors hover:bg-white/10 hover:text-white"
          >
            {{ 'nav.leaderboard' | transloco }}
          </a>
        </li>
        <li>
          <a
            routerLink="/how-to-play"
            routerLinkActive="bg-emerald-500 text-white shadow-sm"
            class="block rounded-full px-3 py-1.5 text-emerald-50/80 transition-colors hover:bg-white/10 hover:text-white"
          >
            {{ 'nav.howToPlay' | transloco }}
          </a>
        </li>
      </ul>

      <div class="flex items-center gap-3 text-sm sm:ms-auto">
        <combi-language-switcher />
        @defer (on idle) {
          <combi-auth-status />
        } @placeholder {
          <span class="h-8 w-20" aria-hidden="true"></span>
        }
      </div>
    </nav>
  </header>

  <main class="mx-auto w-full max-w-5xl flex-1 px-4 py-6">
    <router-outlet />
  </main>
</div>
